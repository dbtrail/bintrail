version: 2

builds:
  - id: bintrail
    binary: bintrail
    main: ./cmd/bintrail
    env:
      - CGO_ENABLED=1
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    overrides:
      - goos: linux
        goarch: amd64
        env:
          - CGO_ENABLED=1
          - CC=zig-cc-x86_64
          - CXX=zig-cxx-x86_64
      - goos: linux
        goarch: arm64
        env:
          - CGO_ENABLED=1
          - CC=zig-cc-aarch64
          - CXX=zig-cxx-aarch64
    ldflags:
      - -s -w
      - -X main.Version={{.Version}}
      - -X main.CommitSHA={{.Commit}}
      - -X main.BuildDate={{.Date}}

  - id: bintrail-mcp
    binary: bintrail-mcp
    main: ./cmd/bintrail-mcp
    env:
      - CGO_ENABLED=1
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    overrides:
      - goos: linux
        goarch: amd64
        env:
          - CGO_ENABLED=1
          - CC=zig-cc-x86_64
          - CXX=zig-cxx-x86_64
      - goos: linux
        goarch: arm64
        env:
          - CGO_ENABLED=1
          - CC=zig-cc-aarch64
          - CXX=zig-cxx-aarch64
    ldflags:
      - -s -w
      - -X main.mcpVersion={{.Version}}

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    builds:
      - bintrail
      - bintrail-mcp

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
